spring:
  config:
    activate:
      on-profile: test   # test profile (H2)

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true   # run schema.sql before data-h2.sql
    show-sql: false

  sql:
    init:
      mode: always
      data-locations: classpath:data-h2.sql   # use H2-specific data

external:
  base-url: http://localhost